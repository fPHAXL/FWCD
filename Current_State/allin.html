    <style>
        /* --- GLOBAL: Hide Page Scrollbars --- */
html, body {
    width: 100%;

/* --- TIMELINE: Ensure it's ALWAYS on top (z-index 2000+) --- */
#timeline-wrapper {
    position: fixed; /* Changed from relative/absolute to fixed */
    top: 0;
    left: 0;
    width: 100%;
    height: 98px;
    background: rgba(15, 15, 15, 0.95);
    
    border-bottom: 1px solid #111;
    overflow-x: auto;
    overflow-y: hidden;

    z-index: 2000 !important; /* CRITICAL: Higher than Leaflet's max */
    scrollbar-width: none;
    -ms-overflow-style: none;
    box-shadow: 0 0.5px 1px #111;
}

#timeline-wrapper::-webkit-scrollbar {
    display: none;
    width: 0;
    background: transparent;
}

/* --- MAP: Ensure it stays BELOW the timeline --- */
#map {
    position: absolute;
    top: 98px; /* Push map below timeline */

    width: 100%;

     background: #111; /* Match timeline background color to hide gaps */

<body><div id="timeline-center-marker" title="Jump to Current Time"></div>
    <!-- 1. Load Venues Data FIRST -->
    <script src="venues.js"></script>
<!-- Timeline Container -->
<div id="timeline-wrapper">
    
    <div id="timeline-track">
        <!-- Match cards injected here -->
    </div>
</div>
<div id="map"></div>
<div id="map-tooltip"></div>   
<!-- Year Filter UI -->
<div id="year-filter-container" title="Scroll to change year, Click to reset">
    <!-- Years injected by JS -->
    <div id="reset-hint">Click to reset</div>
</div>   
<script src="data.js"></script>

<script>
// --- GLOBAL VARIABLES ---
let allNodes = [];
let allLinks = [];
let uniqueYears = [];
let selectedYear = null;
let currentYearIndex = -1;
let yearColorMap = {}; // Store colors to match filter glow to map dots

// --- 1. INITIALIZE MAP ---
const map = L.map('map', {
    worldCopyJump: false,
    noWrap: false,
    zoomControl: false // Hide default zoom for cleaner look (optional)
}).setView([20, 0], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 19
}).addTo(map);



// --- 2. SETUP D3 ---
const svg = d3.select(map.getPanes().overlayPane).append('svg');

// ADD THIS: Define the Glow Filter
svg.append('defs')
    .append('filter')
    .attr('id', 'glow-filter')
    .attr('x', '-50%')
    .attr('y', '-50%')
    .attr('width', '200%')
    .attr('height', '200%')
    .html(`
        <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
        <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    `);

const g = svg.append('g').attr('class', 'leaflet-zoom-hide');   

// --- 2. CONFIGURATION ---
const successRadius = {
    "Champion": 14, "Final": 11, "Semi-Final": 9, 
    "Quarter-Final": 7, "Round 16": 6, "Group": 5, "Host": 8
};

const specialColors = {
    "Host": "#00FF00", "Champion": "#FFD700", 
    "Final": "#C0C0C0", "Semi-Final": "#CD7F32"
};

const yearColorScale = d3.scaleOrdinal()
    .domain(d3.range(1930, 2027))
    .range(d3.quantize(d3.interpolateRainbow, 97));

// --- 3. PROCESS DATA ---
function processData() {
    allNodes = [];
    allLinks = [];

    if (typeof fifaWorldCupParticipants === 'undefined') return;

    const byYear = d3.group(fifaWorldCupParticipants, d => d.year);
    uniqueYears = Array.from(byYear.keys()).sort();
    currentYearIndex = -1;

    byYear.forEach((participants, year) => {
        // FIX: Find ALL hosts for this year (e.g., Japan AND South Korea)
        const hosts = participants.filter(p => p.Success === "Host");
        
        participants.forEach(p => {
            let r = successRadius[p.Success] || successRadius["Group"];
            let c = specialColors[p.Success] || yearColorScale(year);

            allNodes.push({ ...p, radius: r, color: c, yearColor: yearColorScale(year) });

            // FIX: Create links from EVERY host to every participant
            if (hosts.length > 0 && p.Success !== "Host") {
                hosts.forEach(host => {
                    // Avoid drawing a line from a host to itself
                    if (p.id !== host.id) {
                        allLinks.push({
                            source: host,
                            target: p,
                            year: year,
                            color: yearColorScale(year)
                        });
                    }
                });
            }
        });
    });

    initYearFilter();
    filterAndDraw();
}   

// ... [Keep Map Initialization and ProcessData same as before] ...
// ENSURE you populate yearColorMap in processData:
/*
    const vibrantColor = yearColorScale(year);
    yearColorMap[year] = vibrantColor; // <--- Add this line
*/

// --- 4. YEAR FILTER UI LOGIC (REPLACED) ---
function initYearFilter() {
    const container = document.getElementById('year-filter-container');
    const hint = document.getElementById('reset-hint');
    container.innerHTML = '';
    container.appendChild(hint);

    uniqueYears.forEach((year, index) => {
        const el = document.createElement('div');
        el.className = 'year-option';
        el.textContent = year;
        el.dataset.year = year;
        el.dataset.index = index;
        
        // Click individual year to select
        el.addEventListener('click', (e) => {
            e.stopPropagation(); // Prevent container reset click
            if (selectedYear === year) {
                resetFilter();
            } else {
                currentYearIndex = index;
                selectedYear = year;
                updateFisheyeUI();
                filterAndDraw();
            }
        });

        container.insertBefore(el, hint);
    });

    // Scroll Event
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        // Adjust sensitivity
        const sensitivity = 50; 
        if (e.deltaY > sensitivity) changeYear(1);
        else if (e.deltaY < -sensitivity) changeYear(-1);
    }, { passive: false });

    // Click Container to Reset
    container.addEventListener('click', () => {
        if (selectedYear !== null) resetFilter();
    });

    updateFisheyeUI();
}

function changeYear(direction) {
    let newIndex = currentYearIndex;
    if (newIndex === -1) {
        // If "All" was selected, jump to nearest or start
        newIndex = direction > 0 ? 0 : uniqueYears.length - 1;
    } else {
        newIndex += direction;
        if (newIndex < 0) newIndex = 0;
        if (newIndex >= uniqueYears.length) newIndex = uniqueYears.length - 1;
    }

    if (newIndex !== currentYearIndex) {
        currentYearIndex = newIndex;
        selectedYear = uniqueYears[currentYearIndex];
        updateFisheyeUI();
        filterAndDraw();
    }
}

function resetFilter() {
    selectedYear = null;
    currentYearIndex = -1;
    updateFisheyeUI();
    filterAndDraw();
}

// --- NEW: Dynamic Fisheye Calculation ---
function updateFisheyeUI() {
    const options = document.querySelectorAll('.year-option');
    const centerIndex = currentYearIndex;
    
    // If no year selected, show all evenly but dim
    if (centerIndex === -1) {
        options.forEach(opt => {
            opt.style.transform = 'scale(0.8)';
            opt.style.fontSize = '0.9rem';
            opt.style.opacity = '0.5';
            opt.style.color = '#555';
            opt.style.textShadow = 'none';
            opt.classList.remove('accented');
        });
        return;
    }

    options.forEach(opt => {
        const index = parseInt(opt.dataset.index);
        const year = opt.dataset.year;
        const distance = Math.abs(index - centerIndex);
        
        // Fisheye Math: Closer = Bigger
        let scale, fontSize, opacity, color, shadow;

        if (distance === 0) {
            // CENTER (Active)
            scale = 1.6;
            fontSize = '0.8rem';
            opacity = 1;
            color = '#ffffff';
            // ACCENT GLOW: Match the map color for this year
            const yearColor = yearColorMap[year] || '#ffffff';
            shadow = `0 0 10px ${yearColor}, 0 0 20px ${yearColor}`;
            opt.classList.add('accented');
        } else if (distance === 1) {
            // Immediate Neighbors
            scale = 1;
            fontSize = '1.3rem';
            opacity = 0.4;
            color = '#aaa';
            shadow = 'none';
            opt.classList.remove('accented');
        } else if (distance === 2) {
            // Second Neighbors
            scale = 0.9;
            fontSize = '1rem';
            opacity = 0.4;
            color = '#666';
            shadow = 'none';
            opt.classList.remove('accented');
        } else {
            // Far away
            scale = 0.7;
            fontSize = '0.8rem';
            opacity = 0.2;
            color = '#444';
            shadow = 'none';
            opt.classList.remove('accented');
        }

        opt.style.transform = `scale(${scale})`;
        opt.style.fontSize = fontSize;
        opt.style.opacity = opacity;
        opt.style.color = color;
        opt.style.textShadow = shadow;
    });
}

// ... [Keep filterAndDraw, generateDynamicElements, and draw same as before] ...

// --- 5. FILTER & DRAW ---
function filterAndDraw() {
    // Filter Data
    let filteredNodes = allNodes;
    let filteredLinks = allLinks;

    if (selectedYear !== null) {
        filteredNodes = allNodes.filter(n => n.year === selectedYear);
        filteredLinks = allLinks.filter(l => l.year === selectedYear);
    }

    // Generate Dynamic Repetitions for the FILTERED set
    generateDynamicElements(filteredNodes, filteredLinks);
    draw();
}

let renderNodes = [];
let renderLinks = [];

function generateDynamicElements(nodes, links) {
    renderNodes = [];
    renderLinks = [];

    const worldWidthPixels = 256 * Math.pow(2, map.getZoom());
    const mapWidthPixels = map.getSize().x;
    const copiesNeeded = Math.ceil(mapWidthPixels / worldWidthPixels) + 2;

    for (let i = -copiesNeeded; i <= copiesNeeded; i++) {
        const lngOffset = i * 360;
        nodes.forEach(n => {
            renderNodes.push({ ...n, lng: n.lng + lngOffset, worldCopyIndex: i });
        });
        links.forEach(l => {
            renderLinks.push({
                source: { ...l.source, lng: l.source.lng + lngOffset },
                target: { ...l.target, lng: l.target.lng + lngOffset },
                worldCopyIndex: i
            });
        });
    }
}

function draw() {
    const bounds = map.getBounds();
    const topLeft = map.latLngToLayerPoint(bounds.getNorthWest());
    const bottomRight = map.latLngToLayerPoint(bounds.getSouthEast());

    svg
        .attr('width', bottomRight.x - topLeft.x)
        .attr('height', bottomRight.y - topLeft.y)
        .style('left', topLeft.x + 'px')
        .style('top', topLeft.y + 'px');

    g.attr('transform', `translate(${-topLeft.x},${-topLeft.y})`);

    // --- Draw Lines (Unchanged) ---
    g.selectAll('.host-line')
        .data(renderLinks)
        .join('path')
        .attr('class', 'host-line')
        .attr('d', d => {
            const x1 = map.latLngToLayerPoint([d.source.lat, d.source.lng]).x;
            const y1 = map.latLngToLayerPoint([d.source.lat, d.source.lng]).y;

// --- DYNAMIC VENUE LOOKUP LOGIC ---
function initVenues() {
  if (typeof venuesData !== 'undefined' && venuesData.venues) {
    // Convert the venues object into a fast lookup map
    venuesMap = venuesData.venues;
    console.log(`Loaded ${Object.keys(venuesMap).length} venues for lookup.`);

function getVenueDetails(venueId) {
  if (!venueId || !venuesMap[venueId]) {
    return { realName: 'TBD', city: 'TBD' };
  }
  const venue = venuesMap[venueId];
  return {
    realName: venue.realName || 'Unknown Stadium',
    city: venue.city || 'Unknown City'
  };
}

// Convert UTC to Local Time
function getLocalTime(utcString) {
  const date = new Date(utcString);
  return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Horizontal Scroll with Mouse Wheel
timelineWrapper.addEventListener('wheel', (evt) => {
  evt.preventDefault();
  timelineWrapper.scrollLeft += evt.deltaY;
});

// --- Fetch Matches ---
async function fetchMatches() {
  const now = Date.now();
  if (matchesCache && (now - lastFetchTime) < CACHE_DURATION) return matchesCache;

  try {
    const response = await fetch(`${DATA_URL}?t=${now}`);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    
    const data = await response.json();
    let finalData = data;
    
    if (Array.isArray(data)) finalData = data;
    else if (data.matches && Array.isArray(data.matches)) finalData = data.matches;
    else if (data.data && Array.isArray(data.data)) finalData = data.data;
    else {
      const key = Object.keys(data).find(k => Array.isArray(data[k]));
      if (key) finalData = data[key];
    }

    matchesCache = finalData;
    lastFetchTime = now;
    return finalData;
  } catch (error) {
    console.error('Failed to fetch matches:', error);
    return matchesCache || [];
  }
}

// --- Render Timeline ---
function renderTimeline(matches) {
  timelineTrack.innerHTML = '';
  if (!matches || matches.length === 0) {
    timelineTrack.innerHTML = '<div style="color:#666; padding:20px;">No match data available</div>';
    return;
  }

  matches.sort((a, b) => new Date(a.date) - new Date(b.date));

  matches.forEach(match => {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.id = `match-${match.n}`;
    card.dataset.date = match.date;
    
    const isFinished = match.status === 'finished';
    const isLive = match.status === 'live';
    
    // Team Data
    const homeTeam = match.home ? (match.home.name || match.home.code || 'TBD') : (match.team1 || 'TBD');
    const awayTeam = match.away ? (match.away.name || match.away.code || 'TBD') : (match.team2 || 'TBD');
    const homeCode = match.home ? (match.home.code || '') : '';
    const awayCode = match.away ? (match.away.code || '') : '';
    const homeScore = match.home ? match.home.score : match.score1;
    const awayScore = match.away ? match.away.score : match.score2;
    
    // DYNAMIC VENUE LOOKUP
    const venueId = match.venueId || match.venue;
    const venueDetails = getVenueDetails(venueId);
    const stadiumText = `${venueDetails.realName}, ${venueDetails.city}`;

    // Status
    // --- Helper: Calculate Live Minute from Start Time ---
function calculateLiveMinute(startDateStr) {
  const startDate = new Date(startDateStr);
  const now = new Date();
  const diffMs = now - startDate;
  
  // Convert milliseconds to minutes
  let minutes = Math.floor(diffMs / 60000);
  
  // Cap at 90+ (or 120 for extra time) to avoid unrealistic numbers if data is stale
  if (minutes > 120) minutes = 120;
  if (minutes < 0) minutes = 0;
  
  return minutes;
}

// --- Inside renderTimeline, where statusText is defined ---
// --- Inside renderTimeline, where statusText is defined ---
let statusText, statusClass;

if (isFinished) {
  if (match.time && typeof match.time === 'string' && match.time.trim() !== '') {
    
    // Extract numeric value (e.g., "98'" -> 98)
    const totalMinutes = parseInt(match.time.replace("'", ""), 10);
    
    if (!isNaN(totalMinutes)) {
      if (totalMinutes > 90) {
        // Calculate stoppage time (e.g., 98 - 90 = 8)
        const stoppageTime = totalMinutes - 90;
        // Output: FT +8'
        statusText = `FT +${stoppageTime}'`;
      } else if (totalMinutes > 45 && totalMinutes <= 60) {
        // Handle Half Time stoppage (e.g., 48' -> HT +3')
        const stoppageTime = totalMinutes - 45;
        statusText = `HT +${stoppageTime}'`;
      } else {
        // Regular time (e.g., 45', 90') -> Just show FT
        statusText = 'FT';
      }
    } else {
      statusText = 'FT';
    }
  } else {
    statusText = 'FT';
  }
  statusClass = 'status-finished';
}      
 else if (isLive) {
  // For LIVE matches, use the 'time' field if available, otherwise calculate from start time
  if (match.time && typeof match.time === 'string' && match.time.trim() !== '') {
    statusText = "LIVE  "+match.time.replace("'", "") + "'" ;
  } else {
    // Fallback: calculate from kickoff time
    const startDate = new Date(match.date);
    const now = new Date();
    const diffMs = now - startDate;
    let minutes = Math.floor(diffMs / 60000);
    if (minutes > 120) minutes = 120;
    if (minutes < 0) minutes = 0;
    statusText = minutes + "'";
  }
  statusClass = 'status-live';
} else {
  // Future matches: Show local kick-off time
  statusText = getLocalTime(match.date);
  statusClass = 'status-scheduled';
}      
    const stageName = match.stage === 'r32' ? 'Round of 32' : match.stage === 'qf' ? 'Quarter-Final' : match.stage === 'sf' ? 'Semi-Final' : match.stage === 'final' ? 'Final' : 'Group';

  // Auto-refresh
  setInterval(async () => {

    renderTimeline(matchesCache);
    scrollToCurrentTime();
  }, 60000);
}   

function scrollToMatch(cardElement) {
  const wrapper = document.getElementById('timeline-wrapper');
  const cardCenter = cardElement.offsetLeft + (cardElement.offsetWidth / 2);
  const wrapperCenter = wrapper.offsetWidth / 2;
  wrapper.scrollTo({ left: cardCenter - wrapperCenter, behavior: 'smooth' });
}

function scrollToCurrentTime() {
    if (!matchesCache) return;
    
    const now = new Date();
    const cards = document.querySelectorAll('.match-card');
    let liveCard = null;
    let lastFinishedCard = null;
    let nextUpcomingCard = null;

    cards.forEach(card => {
        card.classList.remove('active');
        const matchDate = new Date(card.dataset.date);
        const statusEl = card.querySelector('.card-top span:last-child');
        const isLive = statusEl && statusEl.classList.contains('status-live');

        // Priority 1: Live Match
        if (isLive) {
            liveCard = card;
        }
        
        // Priority 2: Last Finished Match (if no live match)
        if (matchDate <= now) {
            lastFinishedCard = card;
        } 
        // Priority 3: Next Upcoming (if no live or finished)
        else if (!nextUpcomingCard) {
            nextUpcomingCard = card;
        }
    });

    // Select based on priority: Live > Last Finished > Next Upcoming
    const activeCard = liveCard || lastFinishedCard || nextUpcomingCard;
    
    if (activeCard) {
        activeCard.classList.add('active');
        // Use scrollIntoView for smoother, native centering
        activeCard.scrollIntoView({ 
            behavior: 'smooth', 
            inline: 'center', 
            block: 'nearest' 
        });
    }
}

 function addStadiumMarkers() {

    let html = '<div class="stadium-match-list">';
    
    venueMatches.forEach(m => {
      const dateObj = new Date(m.date);
      const dateStr = dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' });

      const awayScore = m.away ? m.away.score : m.score2;
      const isFinished = m.status === 'finished';

      html += `
         <div class="stadium-match-item">
    <span class="stadium-match-meta">${dateStr}</span>

    </span><span class="stadium-match-meta">${timeStr}</span>
  </div>
      `;
    });

    html += '</div>';
    return html; // Valid: returning from getMatchesForVenue
  }

    const matchListHtml = getMatchesForVenue(venue.id, matchesCache);

marker.bindPopup(popupContent, {

  closeButton: true,

  offset: [0, -5]       // Slight lift to sit nicely above the icon
});

// Open on Hover
marker.on('mouseover', function() {
  this.openPopup();
});

}
